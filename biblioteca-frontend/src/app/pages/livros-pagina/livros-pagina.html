<div class="cabecalho-pagina">
  <div>
    <h1>Livros</h1>
    <p>Gerencie o acervo e cadastre novos títulos.</p>
  </div>

  <p-button label="Novo livro" icon="pi pi-plus" (click)="abrirFormulario()" />
</div>

<p-card header="Filtros" [style]="{ 'margin-top': '1rem' }">
  <div style="display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(1px, 1fr))">
    <p-inputgroup>
      <p-inputgroup-addon>
        <i class="pi pi-search"></i>
      </p-inputgroup-addon>
      <p-floatlabel variant="on">
        <input pInputText [(ngModel)]="buscaTexto" id="busca" />
        <label for="busca">Buscar (título, autor)</label>
      </p-floatlabel>
    </p-inputgroup>

    <p-inputgroup>
      <p-inputgroup-addon>
        <i class="pi pi-tag"></i>
      </p-inputgroup-addon>

      <p-floatlabel variant="on">
        <p-select
          [options]="categorias"
          [(ngModel)]="categoriaSelecionada"
          id="categoria"
        ></p-select>
        <label for="categoria">Categoria</label>
      </p-floatlabel>
    </p-inputgroup>

    <p-input-group>
      <p-inputgroup-addon>
        <i class="pi pi-info"></i>
      </p-inputgroup-addon>
      <p-floatlabel variant="on">
        <p-select [options]="statusOptions" [(ngModel)]="statusSelecionado" id="status"></p-select>
        <label for="status">Status</label>
      </p-floatlabel>
    </p-input-group>


    <p-button label="Aplicar Filtros" [style]="{'width': '100%'}" severity="info" (click)="filtrarLivros()" />
    <p-button label="Limpar Filtros" [style]="{'width': '100%'}" severity="secondary" (click)="limparFiltros()" />
  </div>
</p-card>

<p-card header="Livros Cadastrados" [style]="{ 'margin-top': '1rem' }">
  <p-table [value]="livrosAMostra" class="livros-table">
    <ng-template #header>
      <tr class="livros-table-row">
        <th>Título</th>
        <th>Autor</th>
        <th>Categoria</th>
        <th>Status</th>
      </tr>
    </ng-template>
    <ng-template #body let-livro>
      <tr>
        <td>{{ livro.titulo }}</td>
        <td>{{ livro.autor }}</td>
        <td>{{ livro.categoriaNome }}</td>
        <td>
          @if (livro.status === "DISPONIVEL") {
            <p-tag severity="success" value="Disponível"></p-tag>
          } @else if (livro.status === "EMPRESTADO") {
            <p-tag severity="info" value="Emprestado"></p-tag>
          }
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<p-dialog
  [(visible)]="mostrarFormulario"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  header="Cadastrar livro"
  [style]="{ width: '30rem' }"
  (onHide)="fecharFormulario()"
>
  <app-livro-forms (criado)="aoLivroCriado()" (cancelado)="fecharFormulario()" />
</p-dialog>
