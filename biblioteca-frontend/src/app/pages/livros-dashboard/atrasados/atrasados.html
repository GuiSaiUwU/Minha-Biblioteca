<p-card header="Empréstimos Atrasados" [style]="{'margin-top': '1rem'}">
  <p-table [value]="atrasados" class="livros-table">
    <ng-template #header>
      <tr class="livros-table-row">
        <th>Título</th>
        <th>Pessoa</th>
        <th>Data Prevista</th>
        <th>Dias atrasados</th>
      </tr>
    </ng-template>
    <ng-template #body let-emprestimo>
      <tr>
        <td>{{ emprestimo.livroTitulo }}</td>
        <td>{{ emprestimo.nomePessoa }}</td>
        <td>{{ emprestimo.dataDevolucaoPrevista | date: 'dd/MM/yyyy' }}</td>
        <td>{{ checarDiasAtrasados(emprestimo) }}</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
