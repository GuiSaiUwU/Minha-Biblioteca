name: CI - MinhaBiblioteca

on:
  push:
    branches: [develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - run: cd biblioteca-backend && mvn verify --no-transfer-progress

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: biblioteca-frontend/package-lock.json
      - run: cd biblioteca-frontend && npm ci
      - run: cd biblioteca-frontend && npm run build